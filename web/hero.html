<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Geist+Mono:wght@400..700&family=Instrument+Sans:wght@400..700&display=swap');
:root{
  --bg:#131417;--line:#262A30;--ink:#F2EEE6;--sub:#B9BCC2;--muted:#7C828C;
  --r1:#E9A14B;--r2:#D98452;--r3:#8C5742;--accent:#56B8C0;
  --font-display:"Bricolage Grotesque",sans-serif;--font-mono:"Geist Mono",monospace;--font-body:"Instrument Sans",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);overflow:hidden;position:relative}
.card{position:absolute;inset:0;padding:74px 90px}
/* warm banana glow, right side */
.glow{position:absolute;right:-140px;top:-120px;width:720px;height:720px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,rgba(233,161,75,.20),rgba(217,132,82,.07) 46%,transparent 68%)}
.grid{position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:60px 60px;-webkit-mask-image:radial-gradient(1000px 600px at 78% 30%,#000,transparent 75%)}
.kick{font-family:var(--font-mono);font-size:15px;font-weight:600;letter-spacing:6px;color:var(--muted);text-transform:uppercase;position:relative}
.kick b{color:var(--r1);font-weight:700}
h1{font-family:var(--font-display);font-weight:800;font-size:96px;line-height:.94;letter-spacing:-.03em;margin-top:24px;position:relative}
h1 .amber{color:var(--r1)}
.sub{font-family:var(--font-body);font-size:23px;line-height:1.4;color:var(--sub);margin-top:22px;max-width:660px;position:relative}
.chips{position:absolute;left:90px;bottom:104px;display:flex;gap:12px}
.chip{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--ink);border:1px solid var(--line);
  border-radius:9px;padding:9px 14px;background:rgba(255,255,255,.02)}
.chip b{color:var(--r1)}
.rule{position:absolute;left:90px;right:90px;bottom:78px;height:1px;
  background:linear-gradient(90deg,var(--r1),var(--r3) 40%,transparent)}
.brand{position:absolute;left:90px;bottom:34px;display:flex;align-items:center;gap:10px}
.brand svg{width:22px;height:16px;display:block}
.brand .nm{font-family:var(--font-display);font-weight:800;font-size:18px;color:var(--ink)}
.brand .dot{font-family:var(--font-mono);font-size:13px;color:var(--muted)}
.tag{position:absolute;right:90px;bottom:34px;font-family:var(--font-mono);font-size:13px;letter-spacing:2px;color:var(--muted)}
</style></head>
<body><div class="card">
  <div class="glow"></div><div class="grid"></div>
  <div class="kick"><b>Alienrobot</b> &nbsp;·&nbsp; Field Guide &nbsp;·&nbsp; Gemini 3 Pro Image</div>
  <h1>Nano Banana&nbsp;<span class="amber">Pro</span></h1>
  <div class="sub">Turn one product photo into a full campaign — without another production cycle.</div>
  <div class="chips">
    <div class="chip">1 photo</div>
    <div class="chip"><b>→</b> 47 variations</div>
    <div class="chip"><b>→</b> 12 minutes</div>
  </div>
  <div class="rule"></div>
  <div class="brand">
    <svg viewBox="0 0 11 8" shape-rendering="crispEdges" fill="#E9A14B"><rect x="2" y="0" width="1" height="1"/><rect x="8" y="0" width="1" height="1"/><rect x="3" y="1" width="1" height="1"/><rect x="7" y="1" width="1" height="1"/><rect x="2" y="2" width="1" height="1"/><rect x="3" y="2" width="1" height="1"/><rect x="4" y="2" width="1" height="1"/><rect x="5" y="2" width="1" height="1"/><rect x="6" y="2" width="1" height="1"/><rect x="7" y="2" width="1" height="1"/><rect x="8" y="2" width="1" height="1"/><rect x="1" y="3" width="1" height="1"/><rect x="2" y="3" width="1" height="1"/><rect x="4" y="3" width="1" height="1"/><rect x="5" y="3" width="1" height="1"/><rect x="6" y="3" width="1" height="1"/><rect x="8" y="3" width="1" height="1"/><rect x="9" y="3" width="1" height="1"/><rect x="0" y="4" width="1" height="1"/><rect x="1" y="4" width="1" height="1"/><rect x="2" y="4" width="1" height="1"/><rect x="3" y="4" width="1" height="1"/><rect x="4" y="4" width="1" height="1"/><rect x="5" y="4" width="1" height="1"/><rect x="6" y="4" width="1" height="1"/><rect x="7" y="4" width="1" height="1"/><rect x="8" y="4" width="1" height="1"/><rect x="9" y="4" width="1" height="1"/><rect x="10" y="4" width="1" height="1"/><rect x="0" y="5" width="1" height="1"/><rect x="2" y="5" width="1" height="1"/><rect x="3" y="5" width="1" height="1"/><rect x="4" y="5" width="1" height="1"/><rect x="5" y="5" width="1" height="1"/><rect x="6" y="5" width="1" height="1"/><rect x="7" y="5" width="1" height="1"/><rect x="8" y="5" width="1" height="1"/><rect x="10" y="5" width="1" height="1"/><rect x="0" y="6" width="1" height="1"/><rect x="2" y="6" width="1" height="1"/><rect x="8" y="6" width="1" height="1"/><rect x="10" y="6" width="1" height="1"/><rect x="3" y="7" width="1" height="1"/><rect x="4" y="7" width="1" height="1"/><rect x="6" y="7" width="1" height="1"/><rect x="7" y="7" width="1" height="1"/></svg>
    <span class="nm">Alienrobot</span><span class="dot">· John Huikku · alienrobot.com</span>
  </div>
  <div class="tag">CAMPAIGN PLAYBOOK</div>
</div></body></html>
